<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/ncs-logo.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Official e-learning platform for students within the Nigerian Correctional Service, focusing on IT skills and vocational training."
    />
    <title>
      Nigerian Correctional Service - Nigerian Correctional Service E-Learning
      Platform
    </title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Firebase SDK - For production hosting via Firebase -->
    <!-- These scripts are loaded when deployed via Firebase Hosting -->
    <script defer src="/__/firebase/12.5.0/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/12.5.0/firebase-auth-compat.js"></script>
    <script
      defer
      src="/__/firebase/12.5.0/firebase-database-compat.js"
    ></script>
    <script
      defer
      src="/__/firebase/12.5.0/firebase-firestore-compat.js"
    ></script>
    <script
      defer
      src="/__/firebase/12.5.0/firebase-functions-compat.js"
    ></script>
    <script
      defer
      src="/__/firebase/12.5.0/firebase-messaging-compat.js"
    ></script>
    <script defer src="/__/firebase/12.5.0/firebase-storage-compat.js"></script>
    <script
      defer
      src="/__/firebase/12.5.0/firebase-analytics-compat.js"
    ></script>
    <script
      defer
      src="/__/firebase/12.5.0/firebase-remote-config-compat.js"
    ></script>
    <script
      defer
      src="/__/firebase/12.5.0/firebase-performance-compat.js"
    ></script>
    <!-- Initialize Firebase SDK - useEmulator=true for development -->
    <script defer src="/__/firebase/init.js?useEmulator=true"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="../src/main.tsx"></script>

    <!-- Firebase SDK Status Check (Optional - only when hosted via Firebase) -->
    <script>
      // Only run this when Firebase hosting scripts are available
      if (typeof firebase !== "undefined") {
        document.addEventListener("DOMContentLoaded", function () {
          try {
            let app = firebase.app();
            let features = [
              "auth",
              "database",
              "firestore",
              "functions",
              "messaging",
              "storage",
              "analytics",
              "remoteConfig",
              "performance",
            ].filter((feature) => typeof app[feature] === "function");
            console.log(`Firebase SDK loaded with ${features.join(", ")}`);
          } catch (e) {
            console.error("Error loading Firebase SDK:", e);
          }
        });
      }
    </script>
  </body>
</html>
